<div class="auth-page-wrapper fade-in">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fas fa-key"></i>
            </div>
            <h1 class="auth-title">نسيت كلمة المرور؟</h1>
            <p class="auth-subtitle">لا تقلق، أدخل بريدك الإلكتروني وسنرسل لك رمزاً لإعادة التعيين</p>
        </div>

        @if (errorMessage()) {
        <div class="auth-error-badge">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ errorMessage() }}</span>
        </div>
        }

        @if (successMessage()) {
        <div class="auth-success-badge">
            <i class="fas fa-check-circle"></i>
            <span>{{ successMessage() }}</span>
        </div>
        }

        <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="auth-form">
            <div class="auth-input-group">
                <label for="email" class="auth-label">البريد الإلكتروني</label>
                <div class="auth-input-wrapper">
                    <input type="email" id="email" formControlName="email" class="auth-input"
                        placeholder="name@example.com" />
                    <i class="fas fa-envelope"></i>
                </div>
            </div>

            <button type="submit" class="auth-btn-submit" [disabled]="isLoading()">
                @if (!isLoading()) {
                <span>إرسال الرمز</span>
                } @else {
                <span class="flex items-center justify-center gap-2">
                    <i class="fas fa-circle-notch fa-spin"></i>
                    جاري العمل...
                </span>
                }
            </button>

            <div class="auth-footer">
                <a routerLink="/login" class="auth-link">
                    <i class="fas fa-arrow-right ml-1"></i>
                    العودة لتسجيل الدخول
                </a>
            </div>
        </form>
    </div>
</div>
