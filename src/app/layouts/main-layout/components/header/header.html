<header class="header">
  <div class="header-container">
    <!-- Logo -->
    <a routerLink="/" class="logo" aria-label="دار القرآن - الرئيسية">
      <div class="logo-icon" aria-hidden="true">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="18" r="16" fill="#6B9B7A" opacity="0.12" stroke="#6B9B7A" stroke-width="2" />
          <text x="18" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="#6B9B7A"
            font-family="Tajawal">ق</text>
        </svg>
      </div>
      <span class="logo-text">دار القرآن</span>
    </a>

    <!-- Navigation -->
    <nav class="nav-menu" [class.active]="isMenuOpen" aria-label="القائمة الرئيسية">
      @for (item of navItems; track item.label) {
      <a [routerLink]="item.link" (click)="closeMenu()" class="nav-item">
        {{ item.label }}
      </a>
      }
    </nav>

    <!-- Actions -->
    <div class="header-actions">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input type="text" placeholder="ابحث…" class="search-input" aria-label="بحث">
      </div>

      @if (currentUser()) {
      <div class="user-profile">
        <button (click)="navigateToDashboard()" class="user-profile-btn" [attr.aria-label]="'لوحة تحكم ' + currentUser()?.prenom">
          <div class="user-avatar" aria-hidden="true">
            {{ currentUser()?.prenom?.[0] }}{{ currentUser()?.nom?.[0] }}
          </div>
          <span class="user-name">{{ currentUser()?.prenom }} {{ currentUser()?.nom }}</span>
        </button>
        <button (click)="logout()" class="logout-btn">تسجيل الخروج</button>
      </div>
      } @else {
      <button routerLink="/login" class="login-btn">تسجيل الدخول</button>
      }
    </div>

    <!-- Mobile toggle -->
    <button class="mobile-menu-btn" (click)="toggleMenu()"
      [attr.aria-label]="isMenuOpen ? 'إغلاق القائمة' : 'فتح القائمة'" [attr.aria-expanded]="isMenuOpen">
      <span class="menu-line"></span>
      <span class="menu-line"></span>
      <span class="menu-line"></span>
    </button>
  </div>
</header>
