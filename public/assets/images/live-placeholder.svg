  </g>

  <rect x="80" y="80" width="120" height="44" rx="22" fill="#dc2626"/>
  <text x="140" y="109" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="700">LIVE</text>

  <text x="640" y="560" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="34" font-weight="700">
    DarQuran Live Stream
  </text>
  <text x="640" y="600" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="22">
